version: "3.9"

# ═══════════════════════════════════════════════
#  Discord Clone — Docker Database Infrastructure
# ═══════════════════════════════════════════════

services:
  # ── PostgreSQL Database ──
  postgres:
    image: postgres:16-alpine
    container_name: discord_db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-discord_clone}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-discord_clone}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - discord_net

  # ── pgAdmin (Panel de administración visual) ──
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: discord_pgadmin
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@discord.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./docker/pgadmin-servers.json:/pgadmin4/servers.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - discord_net

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  discord_net:
    driver: bridge
